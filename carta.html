<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="css/styleindex.css">
    <link rel="stylesheet" href="css/carta.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/celular.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">
            <img class="imgLogo" src="img/LOGO/logomarea.png" alt="Logo de la marca">
        </div>

        <!-- BOTON HAMBURGUESA -->
        <button class="hamburger" id="hamburger">
            ☰
        </button>

        <!-- MENU -->
        <ul class="nav-links" id="navLinks">

            <li>
                <a href="index.html">
                    <img class="navImg" src="img/LOGO/casita.png" alt="Inicio">
                </a>
            </li>

            <li>
                <a href="menu.html">
                    <img class="navImg" src="img/LOGO/cafe.png" alt="Menú">
                </a>
            </li>

            <li>
                <a href="ubicacion.html">
                    <img class="navImg" src="img/LOGO/ubicacion.png" alt="Ubicación">
                </a>

            <li>
                <a href="iniciosesion.html">
                    <img class="navImg" src="img/LOGO/usuario.png" alt="Usuario">
                </a>
            </li>

        </ul>

    </nav>

    <!-- TABLA -->

    <section class="carta-marea">

        <h2>Marea</h2>

        <table class="tabla-carta">

            <thead>
                <tr>
                    <th>Categoria</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Acciones</th>

                </tr>
            </thead>
            <tbody id="lista">
            </tbody>

        </table>

        <form id="formCafe">
            <label for="">Categoria</label>
            <input id="categoria" type="text">
            <label for="">Descripción</label>
            <input id="descripcion" type="text">
            <label for="">Precio</label>
            <input id="precio" type="number">
            <button type="submit">Guardar</button>

        </form>

    </section>

    <footer class="footer">
        <div class="footer-contenedor">

            <div class="footer-seccion">
                <h2>Marea</h2>
                <p>Café de especialidad</p>
            </div>

            <div class="footer-seccion">
                <h3>Contacto</h3>
                <p>marea@cafecito.com</p>
                <p>2262-0303456</p>
            </div>

            <div class="footer-seccion">
                <h3>Información</h3>
                <p>Horarios: 8:00 - 20:00</p>
            </div>

            <div class="footer-seccion">
                <h3>Redes</h3>
                <p>Instagram / marea.cafe</p>
                <p>TikTok / mareaTiktokera</p>
            </div>
        </div>

        <div class="footer-boton">
            <p>© 2026 - Marea</p>
        </div>

    </footer>
    <script src="js/hamburguesa.js"></script>
    <script src="js/carta.js"></script>

</html>
